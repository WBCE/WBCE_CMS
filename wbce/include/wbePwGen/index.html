<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>wbePwGen — Demo</title>
<link rel="stylesheet" href="wbePwGen.css" />
<style>
*, *::before, *::after { box-sizing: border-box; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #f5f6fa;
  color: #1e293b;
  margin: 0;
  padding: 40px 20px;
  font-size: 15px;
}
#demo {
  max-width: 420px;
  margin: 0 auto;
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 28px 28px 24px;
}
h2 { font-size: 1.1rem; margin: 0 0 20px; color: #1e293b; }
label {
  display: block;
  font-size: .82rem;
  font-weight: 500;
  color: #64748b;
  margin-bottom: 5px;
  margin-top: 18px;
}
label:first-of-type { margin-top: 0; }
input[type="password"],
input[type="text"] {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
  font-size: .95rem;
  font-family: inherit;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  color: #1e293b;
}
input:focus {
  border-color: #94a3b8;
  box-shadow: 0 0 0 3px rgba(148,163,184,.2);
}
</style>
</head>
<body>
<div id="demo">
  <h2>Password</h2>

  <label for="pw">Password</label>
  <input id="pw" type="password" autocomplete="new-password" />
  <div id="pw-wrap" class="wpg-wrap"></div>

  <label for="pw2">Confirm password</label>
  <input id="pw2" type="password" autocomplete="new-password" />
</div>

<script src="wbePwGen.js"></script>
<script>
WbePwGen.attach('pw', 'pw-wrap', { confirmId: 'pw2' });
</script>
</body>
</html>
